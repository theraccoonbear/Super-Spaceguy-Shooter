name: Build

on:
  push:
    branches: [ master, 'feat/**', 'bug/**', 'fix/**' ]
    tags: [ 'v[0-9]*' ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: Build Linux
            artifact-name: sss-linux
            artifact-path: builds/sss
            release-asset-name: sss-linux
            sidecar-binary: sss-net
            sidecar-release-name: sss-net-linux
          - os: macos-latest
            name: Build macOS
            artifact-name: sss-macos
            artifact-path: builds/sss
            release-asset-name: sss-macos
            sidecar-binary: sss-net
            sidecar-release-name: sss-net-macos
          - os: windows-latest
            name: Build Windows
            artifact-name: sss-windows
            artifact-path: builds/sss.exe
            release-asset-name: sss-windows.exe
            sidecar-binary: sss-net.exe
            sidecar-release-name: sss-net-windows.exe

    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: sidecar/go.mod

      - name: Resolve QB64-PE release version
        id: qb64pe_release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RELEASE_JSON=$(gh api repos/QB64-Phoenix-Edition/QB64pe/releases/latest)
          case "$(uname -s)" in
            Darwin*)              FILTER="osx" ;;
            MINGW*|MSYS*|CYGWIN*) FILTER="win-x64" ;;
            *)                    FILTER="lnx" ;;
          esac
          ASSET_URL=$(echo "$RELEASE_JSON" \
            | python3 -c "import sys,json; f='${FILTER}'; assets=json.load(sys.stdin)['assets']; print(next(a['browser_download_url'] for a in assets if f in a['name'].lower()))")
          VERSION=$(echo "$RELEASE_JSON" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['tag_name'])")
          echo "asset_url=$ASSET_URL" >> $GITHUB_OUTPUT
          echo "version=$VERSION"     >> $GITHUB_OUTPUT

      - name: Cache QB64-PE
        id: cache_qb64pe
        uses: actions/cache@v4
        with:
          path: qb64pe-bin
          key: qb64pe-${{ steps.qb64pe_release.outputs.version }}-${{ runner.os }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libgl1-mesa-dev libglu1-mesa-dev libasound2-dev libx11-dev libxext-dev libpng-dev xvfb

      - name: Install QB64-PE (Linux/macOS)
        if: steps.cache_qb64pe.outputs.cache-hit != 'true' && runner.os != 'Windows'
        run: |
          curl -fsSL -o qb64pe.tar.gz "${{ steps.qb64pe_release.outputs.asset_url }}"
          tar xzf qb64pe.tar.gz
          case "$(uname -s)" in
            Darwin*) cd qb64pe && bash setup_osx.command 1 && cd .. ;;
            *)       cd qb64pe && bash setup_lnx.sh 1      && cd .. ;;
          esac
          mv qb64pe qb64pe-bin

      - name: Install QB64-PE (Windows)
        if: steps.cache_qb64pe.outputs.cache-hit != 'true' && runner.os == 'Windows'
        shell: pwsh
        run: |
          Invoke-WebRequest "${{ steps.qb64pe_release.outputs.asset_url }}" -OutFile qb64pe.7z
          7z x qb64pe.7z
          Rename-Item qb64pe qb64pe-bin

      - name: Build sss.bas
        shell: bash
        run: QB64_BIN_DIR=qb64pe-bin bash .github/scripts/qb64build.sh

      - name: Build sidecar
        shell: bash
        run: |
          cd sidecar
          go build -ldflags="-s -w" -o ../builds/${{ matrix.sidecar-binary }} .

      - name: Dump compile log on failure
        if: failure()
        shell: bash
        run: cat qb64pe-bin/internal/temp/compilelog.txt 2>/dev/null || echo "compilelog.txt not found"

      - name: Upload build artifacts
        if: github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: |
            ${{ matrix.artifact-path }}
            builds/${{ matrix.sidecar-binary }}

      # On a version tag, stage both binaries for the release job.
      - name: Stage release assets
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          cp ${{ matrix.artifact-path }}       ${{ matrix.release-asset-name }}
          cp builds/${{ matrix.sidecar-binary }} ${{ matrix.sidecar-release-name }}

      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.artifact-name }}
          path: |
            ${{ matrix.release-asset-name }}
            ${{ matrix.sidecar-release-name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Download all platform binaries
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            release-assets/* \
            --title "${{ github.ref_name }}" \
            --generate-notes
