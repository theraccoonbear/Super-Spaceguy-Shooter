name: Build

on:
  push:
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Resolve QB64-PE release version
        id: qb64pe_release
        run: |
          RELEASE_JSON=$(curl -fsSL https://api.github.com/repos/QB64-Phoenix-Edition/QB64pe/releases/latest)
          ASSET_URL=$(echo "$RELEASE_JSON" \
            | python3 -c "import sys,json; assets=json.load(sys.stdin)['assets']; print(next(a['browser_download_url'] for a in assets if 'lnx' in a['name'].lower()))")
          VERSION=$(echo "$RELEASE_JSON" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['tag_name'])")
          echo "asset_url=$ASSET_URL" >> $GITHUB_OUTPUT
          echo "version=$VERSION"     >> $GITHUB_OUTPUT

      - name: Cache QB64-PE
        id: cache_qb64pe
        uses: actions/cache@v4
        with:
          path: qb64pe-bin
          key: qb64pe-${{ steps.qb64pe_release.outputs.version }}-linux

      - name: Build QB64-PE from source
        if: steps.cache_qb64pe.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libgl1-mesa-dev libglu1-mesa-dev libasound2-dev libx11-dev libxext-dev libpng-dev
          curl -fsSL -o qb64pe_lnx.tar.gz "${{ steps.qb64pe_release.outputs.asset_url }}"
          tar xzf qb64pe_lnx.tar.gz
          cd qb64pe && bash setup_lnx.sh 1 && cd ..
          mv qb64pe qb64pe-bin

      - name: Build sss.bas
        run: |
          sudo apt-get install -y libgl1-mesa-dev libglu1-mesa-dev libasound2-dev libx11-dev libxext-dev libpng-dev xvfb
          QB64_BIN_DIR=qb64pe-bin bash .github/scripts/qb64build.sh

      - name: Dump C++ compile log on failure
        if: failure()
        run: cat qb64pe-bin/internal/temp/compilelog.txt 2>/dev/null || echo "compilelog.txt not found"

      - name: Upload artifact
        if: github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: sss-linux
          path: builds/sss

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mv builds/sss builds/sss-linux
          gh release create "${{ github.ref_name }}" builds/sss-linux \
            --title "${{ github.ref_name }}" \
            --generate-notes
